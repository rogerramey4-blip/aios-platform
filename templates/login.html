<!DOCTYPE html>
<html data-theme="dark">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AIOS — Sign In</title>
  <script>(function(){var t=localStorage.getItem('aios-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/aios.css">
  <style>
    .auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg-page);}
    .auth-card{width:100%;max-width:420px;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;overflow:hidden;animation:fadeIn .4s ease;}
    .auth-header{padding:32px 36px 24px;border-bottom:1px solid var(--border-light);}
    .auth-logo{font-size:32px;font-weight:900;letter-spacing:5px;margin-bottom:6px;}
    .auth-logo span{color:var(--gold);}
    .auth-logo-sub{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);}
    .auth-body{padding:28px 36px 32px;}
    .auth-title{font-size:16px;font-weight:700;margin-bottom:6px;}
    .auth-desc{font-size:12px;color:var(--text-secondary);margin-bottom:22px;line-height:1.6;}
    .form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
    .form-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-secondary);}
    .form-inp{background:var(--bg-tertiary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--text-primary);font-family:inherit;outline:none;transition:border-color var(--ease);}
    .form-inp:focus{border-color:var(--gold);}
    .form-inp::placeholder{color:var(--text-muted);}
    .form-btn{width:100%;background:var(--gold);color:#0d1117;border:none;border-radius:var(--radius-sm);padding:12px;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;transition:all var(--ease);margin-top:4px;}
    .form-btn:hover{background:#f0c050;transform:translateY(-1px);}
    .form-error{background:rgba(248,81,73,.12);border:1px solid rgba(248,81,73,.35);border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;color:var(--red);margin-bottom:16px;line-height:1.5;}
    .auth-footer{padding:16px 36px;background:var(--bg-card-alt);border-top:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center;}
    .auth-footer-brand{font-size:11px;color:var(--text-muted);}
    .auth-footer-brand span{color:var(--gold);font-weight:700;}
    .auth-footer-lock{font-size:11px;color:var(--text-muted);}
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">A<span>IOS</span></div>
      <div class="auth-logo-sub">AI Operating System &nbsp;·&nbsp; Secure Access</div>
    </div>
    <div class="auth-body">
      <div class="auth-title">Sign In</div>
      <div class="auth-desc">Enter your authorized email address. A 6-digit access code will be sent to you.</div>
      {% if error %}<div class="form-error">{{ error }}</div>{% endif %}
      <form method="POST" action="/login">
        <div class="form-group">
          <label class="form-lbl" for="email">Email Address</label>
          <input class="form-inp" type="email" name="email" id="email"
                 placeholder="you@aievolutionservices.com"
                 value="{{ prefill }}" required autofocus autocomplete="email">
        </div>
        <button class="form-btn" type="submit">Send Access Code →</button>
      </form>
    </div>
    <div class="auth-footer">
      <div class="auth-footer-brand">Powered by <span>AI Evolution Services</span></div>
      <div class="auth-footer-lock">🔒 Secure OTP</div>
    </div>
  </div>
</div>
</body>
</html>
